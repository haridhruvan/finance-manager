<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register - Finance Manager</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #1e1e2f, #2c2c54);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00adb5;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #019ca3;
    }

    a {
      color: #00adb5;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Register</h2>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

<script>
  const API = "https://finance-manager-api-bg2w.onrender.com";

  document.querySelector("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.querySelectorAll("input")[0].value;
    const email = document.querySelectorAll("input")[1].value;
    const password = document.querySelectorAll("input")[2].value;

    try {
      const res = await fetch(`${API}/api/users/register`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ name, email, password }),
      });

      const data = await res.json();

      if (data._id) {
        alert("Registered successfully ✅");
        window.location.href = "index.html";
      } else {
        alert(data.message);
      }
    } catch (err) {
      alert("Error connecting to server");
    }
  });
</script>

</body>
</html>
