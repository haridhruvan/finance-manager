<!DOCTYPE html>
<html>
<head>
  <title>Finance Manager</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");
      background-size: cover;
      background-position: center;
      color: white;
      transition: 0.3s;
    }

    .container {
      max-width: 500px;
      margin: 80px auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00adb5;
      color: white;
    }

    button:hover {
      background: #019ca3;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: rgba(255,255,255,0.1);
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-group button {
      margin-left: 5px;
      padding: 5px 10px;
      font-size: 12px;
    }

    .dark {
      background: #121212 !important;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>💰 Finance Manager</h2>

    <input type="text" id="expenseName" placeholder="Expense Name" />
    <input type="number" id="amount" placeholder="Amount" />

    <br>

    <button onclick="addExpense()">Add</button>
    <button onclick="toggleTheme()">Toggle Theme</button>

    <h3>📜 Transaction History</h3>
<ul id="expenseList"></ul>
  </div>

  <script src="script.js"></script>

</body>
</html>
